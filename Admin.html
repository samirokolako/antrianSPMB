<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; padding: 20px; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h2 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #34495e; }
    input { width: 100%; padding: 12px; border: 1px solid #dcdfe6; border-radius: 6px; box-sizing: border-box; }
    button { background: #3498db; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { background: #2980b9; }
    #status { margin-top: 15px; text-align: center; color: #27ae60; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>⚙️ Admin Panel</h2>
    <form id="formSetting" onsubmit="simpan(this); return false;">
      <div class="form-group"><label>Nama Sekolah</label><input type="text" name="namaSekolah" id="s1"></div>
      <div class="form-group"><label>Teks Footer PDF</label><input type="text" name="footerTeks" id="s2"></div>
      <div class="form-group"><label>Tanggal Mulai</label><input type="date" name="tanggalMulai" id="s3"></div>
      <div class="form-group"><label>Kuota Siswa/Hari</label><input type="number" name="kuotaHarian" id="s4"></div>
      <div class="form-group"><label>Jumlah Operator (Meja)</label><input type="number" name="jumlahOperator" id="s5"></div>
      <button type="submit">Simpan Konfigurasi</button>
    </form>
    <div id="status"></div>
  </div>
  <script>
    window.onload = function() {
      google.script.run.withSuccessHandler(function(d) {
        document.getElementById('s1').value = d.namaSekolah;
        document.getElementById('s2').value = d.footerTeks;
        document.getElementById('s3').value = new Date(d.tanggalMulai).toISOString().split('T')[0];
        document.getElementById('s4').value = d.kuotaHarian;
        document.getElementById('s5').value = d.jumlahOperator;
      }).getSettings();
    };
    function simpan(f) {
      document.getElementById('status').innerText = "Menyimpan...";
      google.script.run.withSuccessHandler(function(m) {
        document.getElementById('status').innerText = m;
        setTimeout(()=> document.getElementById('status').innerText="", 3000);
      }).saveSettings({
        namaSekolah: f.namaSekolah.value, footerTeks: f.footerTeks.value,
        tanggalMulai: f.tanggalMulai.value, kuotaHarian: f.kuotaHarian.value, jumlahOperator: f.jumlahOperator.value
      });
    }
  </script>
</body>
</html>
